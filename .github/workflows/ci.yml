name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts || true

      - name: Check HTML
        run: |
          npx html-validate index.html || true

      - name: Check for secrets
        run: |
          # Fail if actual Supabase keys are in the code
          if grep -r "eyJ" js/ --include="*.js" | grep -v "CONFIG\|config\|placeholder\|TODO" | head -5; then
            echo "❌ Warning: Possible hardcoded JWT key found in JS files"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify file structure
        run: |
          test -f index.html
          test -f manifest.json
          test -f sw.js
          test -f README.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f .env.example
          test -f .gitignore
          test -f supabase-migration.sql
          test -d js
          test -d css
          test -d android
          echo "✅ All required files present"

      - name: Verify JS modules exist
        run: |
          for f in config utils geo map auth items requests chats images ui profile notifications offline router app; do
            test -f "js/${f}.js" || (echo "❌ Missing js/${f}.js" && exit 1)
          done
          echo "✅ All JS modules present"

      - name: Verify CSS modules exist
        run: |
          for f in variables base layout components map; do
            test -f "css/${f}.css" || (echo "❌ Missing css/${f}.css" && exit 1)
          done
          echo "✅ All CSS modules present"
