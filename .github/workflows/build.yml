name: Build GeoGive TWA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy PWA assets to Android
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
          cp manifest.json android/app/src/main/assets/
          cp sw.js android/app/src/main/assets/
          cp icon-192.png android/app/src/main/assets/
          cp icon-512.png android/app/src/main/assets/
          cp -r css android/app/src/main/assets/
          cp -r js android/app/src/main/assets/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Generate signing key
        working-directory: ./android
        run: |
          keytool -genkeypair \
            -keystore geogive-release-key.jks \
            -alias geogive \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass geogive123 \
            -keypass geogive123 \
            -dname "CN=GeoGive, OU=Mobile, O=GeoGive, L=London, ST=London, C=GB"

      - name: Create gradle-local.properties
        working-directory: ./android
        run: |
          cat > gradle-local.properties << 'EOF'
          storeFile=geogive-release-key.jks
          storePassword=geogive123
          keyAlias=geogive
          keyPassword=geogive123
          EOF

      - name: Build Debug APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          release_name: GeoGive v1.0.0 (build ${{ github.run_number }})
          draft: false
          prerelease: true
          body: |
            GeoGive TWA build ${{ github.run_number }}
            - Debug APK: for testing
            - Release APK: signed, for sideloading

      - name: Upload Debug APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/debug/app-debug.apk
          asset_name: geogive-debug.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload Release APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/release/app-release.apk
          asset_name: geogive-release.apk
          asset_content_type: application/vnd.android.package-archive
