name: Build GeoGive TWA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Check JavaScript syntax
        run: find js -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run GeoGive smoke checks
        run: node test_app.js

      - name: Copy PWA assets to Android
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil
          root = Path('.')
          assets = root / 'android/app/src/main/assets'
          if assets.exists():
              shutil.rmtree(assets)
          assets.mkdir(parents=True, exist_ok=True)
          for name in ['index.html', 'manifest.json', 'sw.js', 'icon-192.png', 'icon-512.png']:
              shutil.copy2(root / name, assets / name)
          for dirname in ['css', 'js']:
              src = root / dirname
              dst = assets / dirname
              if src.exists():
                  shutil.copytree(src, dst)
          print('PWA assets synced into android/app/src/main/assets')
          PY

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: android/gradle/wrapper/gradle-wrapper.properties

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;25.2.9519653"
          yes | sdkmanager --licenses >/dev/null

      - name: Process Android debug manifest
        working-directory: ./android
        run: ./gradlew :app:processDebugManifest

      - name: Check signing secrets
        env:
          GEOGIVE_KEYSTORE_BASE64: ${{ secrets.GEOGIVE_KEYSTORE_BASE64 }}
          GEOGIVE_STORE_PASSWORD: ${{ secrets.GEOGIVE_STORE_PASSWORD }}
          GEOGIVE_KEY_PASSWORD: ${{ secrets.GEOGIVE_KEY_PASSWORD }}
        run: |
          if [ -z "${GEOGIVE_KEYSTORE_BASE64}" ]; then
            echo "::error::Missing GEOGIVE_KEYSTORE_BASE64 secret. Add the base64-encoded geogive-release-key.jks in repository Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${GEOGIVE_STORE_PASSWORD}" ]; then
            echo "::error::Missing GEOGIVE_STORE_PASSWORD secret. Add it in repository Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${GEOGIVE_KEY_PASSWORD}" ]; then
            echo "::error::Missing GEOGIVE_KEY_PASSWORD secret. Add it in repository Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ ${#GEOGIVE_STORE_PASSWORD} -lt 16 ] || [ ${#GEOGIVE_KEY_PASSWORD} -lt 16 ]; then
            echo "::error::Signing passwords must be at least 16 characters. Rotate the weak CI passwords before enabling releases."
            exit 1
          fi

      - name: Decode signing keystore
        working-directory: ./android
        env:
          GEOGIVE_KEYSTORE_BASE64: ${{ secrets.GEOGIVE_KEYSTORE_BASE64 }}
          GEOGIVE_STORE_PASSWORD: ${{ secrets.GEOGIVE_STORE_PASSWORD }}
          GEOGIVE_KEY_PASSWORD: ${{ secrets.GEOGIVE_KEY_PASSWORD }}
        run: |
          echo "${GEOGIVE_KEYSTORE_BASE64}" | base64 --decode > geogive-release-key.jks
          chmod 600 geogive-release-key.jks

      - name: Verify keystore readable
        working-directory: ./android
        env:
          GEOGIVE_STORE_PASSWORD: ${{ secrets.GEOGIVE_STORE_PASSWORD }}
        run: |
          keytool -list -keystore geogive-release-key.jks -storepass "${GEOGIVE_STORE_PASSWORD}" -alias geogive
          echo "✅ Keystore verified and readable"

      - name: Create gradle-local.properties
        working-directory: ./android
        env:
          GEOGIVE_KEYSTORE_BASE64: ${{ secrets.GEOGIVE_KEYSTORE_BASE64 }}
          GEOGIVE_STORE_PASSWORD: ${{ secrets.GEOGIVE_STORE_PASSWORD }}
          GEOGIVE_KEY_PASSWORD: ${{ secrets.GEOGIVE_KEY_PASSWORD }}
        run: |
          cat > gradle-local.properties << EOF
          storeFile=geogive-release-key.jks
          storePassword=${GEOGIVE_STORE_PASSWORD}
          keyAlias=geogive
          keyPassword=${GEOGIVE_KEY_PASSWORD}
          EOF

      - name: Build Debug APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Build Release AAB
        working-directory: ./android
        run: ./gradlew bundleRelease

      - name: Verify APK and AAB archives
        run: |
          unzip -t android/app/build/outputs/apk/debug/app-debug.apk >/dev/null
          unzip -t android/app/build/outputs/apk/release/app-release.apk >/dev/null
          unzip -t android/app/build/outputs/bundle/release/app-release.aab >/dev/null

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geogive-apks
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: GeoGive v1.0.0 (build ${{ github.run_number }})
          draft: false
          prerelease: true
          body: |
            GeoGive TWA build ${{ github.run_number }}

            - Debug APK: for device testing
            - Release APK: signed, for sideloading
            - Release AAB: for Google Play Console upload

            Required secrets for stable signing:
            - `GEOGIVE_KEYSTORE_BASE64`
            - `GEOGIVE_STORE_PASSWORD`
            - `GEOGIVE_KEY_PASSWORD`
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
