name: Build GeoGive TWA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy PWA assets to Android
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
          cp manifest.json android/app/src/main/assets/
          cp sw.js android/app/src/main/assets/
          cp icon-192.png android/app/src/main/assets/
          cp icon-512.png android/app/src/main/assets/
          cp -r css android/app/src/main/assets/
          cp -r js android/app/src/main/assets/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Generate signing key
        working-directory: ./android
        run: |
          keytool -genkeypair \
            -keystore geogive-release-key.jks \
            -alias geogive \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass geogive123 \
            -keypass geogive123 \
            -dname "CN=GeoGive, OU=Mobile, O=GeoGive, L=London, ST=London, C=GB"

      - name: Create gradle-local.properties
        working-directory: ./android
        run: |
          cat > gradle-local.properties << 'EOF'
          storeFile=geogive-release-key.jks
          storePassword=geogive123
          keyAlias=geogive
          keyPassword=geogive123
          EOF

      - name: Build Debug APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: geogive-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build Release APK
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: geogive-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
