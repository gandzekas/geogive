<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2d8a4e">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https: tile.openstreetmap.org *.tile.openstreetmap.org *.cloudfront.net; connect-src 'self' https://*.supabase.co wss://*.supabase.co tile.openstreetmap.org https://*.firebaseapp.com https://*.googleapis.com wss://*.firebaseio.com;">
<title>GeoGive - Give Items Away Locally</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/map.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<!-- [Same HTML body as before] -->
<!-- HEADER -->
<header>
  <h1><span>🎁</span> GeoGive</h1>
  <div class="header-right">
    <div id="connIndicator" class="conn-indicator" style="display:none" title="Connection status"></div>
    <div class="user-info" id="userInfo" style="display:none" onclick="if(window.switchPage)switchPage('profile')">
      <div class="user-avatar" id="headerAvatar"></div>
      <span id="headerName"></span>
    </div>
    <button class="login-btn" id="loginBtn" onclick="openAuthModal()">Sign In</button>
    <button class="logout-btn" id="logoutBtn" style="display:none" onclick="handleLogout()">Logout</button>
    <button class="upgrade-btn" id="settingsBtn" title="Settings" onclick="openSettingsModal()">⚙️</button>
  </div>
</header>

<!-- DEBUG PANEL -->
<div id="debugPanel" style="position:fixed;bottom:60px;left:0;right:0;background:rgba(0,0,0,0.85);color:#0f0;font-size:0.7rem;padding:6px 10px;z-index:999;max-height:80px;overflow-y:auto;font-family:monospace;white-space:pre-wrap;word-break:break-all"></div>

<!-- MAIN CONTENT -->
<main>
  <div class="page active" id="page-browse">
    <div class="view-toggle">
      <button class="active" id="viewListBtn" onclick="setView('list')">📋 List</button>
      <button id="viewMapBtn" onclick="setView('map')">🗺️ Map</button>
    </div>
    <div id="mapContainer"><div id="map"></div></div>
    <div class="radius-bar">
      <label>📍 Radius:</label>
      <input type="range" id="radiusSlider" min="1" max="100" value="10" oninput="updateRadiusLabel(this.value)">
      <span class="radius-value" id="radiusValue">10 mi</span>
    </div>
    <div class="loc-status pending" id="locStatus"><span>📡</span> Detecting your location...</div>
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="🔍 Search items..." oninput="debounceSearch()">
      <select id="categoryFilter" onchange="applyFilters()">
        <option value="">All Categories</option>
        <option value="furniture">🪑 Furniture</option>
        <option value="electronics">📱 Electronics</option>
        <option value="clothing">👕 Clothing</option>
        <option value="books">📚 Books</option>
        <option value="toys">🧸 Toys</option>
        <option value="kitchen">🍳 Kitchen</option>
        <option value="sports">⚽ Sports</option>
        <option value="garden">🌱 Garden</option>
        <option value="other">📦 Other</option>
      </select>
      <select id="statusFilter" onchange="applyFilters()">
        <option value="available">Available</option>
        <option value="all">All Status</option>
      </select>
    </div>
    <div id="itemList"></div>
  </div>

  <div class="page" id="page-post">
    <div class="form-card">
      <h2 style="margin-bottom:16px">📸 List an Item</h2>
      <form id="postForm" onsubmit="handleListSubmit(event)">
        <div class="form-group"><label>Title *</label><input type="text" id="postTitle" required maxlength="100" placeholder="What are you giving away?"></div>
        <div class="form-group"><label>Category</label><select id="postCategory"><option value="furniture">🪑 Furniture</option><option value="electronics">📱 Electronics</option><option value="clothing">👕 Clothing</option><option value="books">📚 Books</option><option value="toys">🧸 Toys</option><option value="kitchen">🍳 Kitchen</option><option value="sports">⚽ Sports</option><option value="garden">🌱 Garden</option><option value="other" selected>📦 Other</option></select></div>
        <div class="form-group"><label>Condition</label><select id="postCondition"><option value="Like New">Like New</option><option value="Good" selected>Good</option><option value="Fair">Fair</option><option value="Needs Repair">Needs Repair</option></select></div>
        <div class="form-group"><label>Description</label><textarea id="postDesc" placeholder="Describe the item..."></textarea></div>
        <div class="form-group"><label>Photos (max 5)</label><input type="file" id="postPhotos" accept="image/*" multiple onchange="handleImageSelect(event)"><div id="imagePreviews" style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"></div></div>
        <button type="submit" class="btn btn-primary btn-full">🎁 Post Item</button>
      </form>
    </div>
  </div>

  <div class="page" id="page-mylistings">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2>📦 My Listings</h2><button class="btn btn-sm btn-secondary" id="showExpiredBtn" onclick="toggleShowExpired()">Show Expired</button></div>
    <div id="myListings"></div>
  </div>

  <div class="page" id="page-requests">
    <h2 style="margin-bottom:12px">📨 Requests</h2>
    <div id="requestsList"></div>
  </div>

  <div class="page" id="page-profile"><div id="profileContent"></div></div>
  <div class="page" id="page-chat"><div id="chatContent"></div></div>
</main>

<nav class="bottom-nav">
  <button class="nav-tab active" data-page="browse" onclick="switchPage('browse')"><span class="nav-icon">🗺️</span> Browse</button>
  <button class="nav-tab" data-page="post" onclick="switchPage('post')"><span class="nav-icon">➕</span> Post</button>
  <button class="nav-tab" data-page="mylistings" onclick="switchPage('mylistings')"><span class="nav-icon">📦</span> My Listings</button>
  <button class="nav-tab" data-page="requests" onclick="switchPage('requests')" id="requestsTab"><span class="nav-icon">📨</span> Requests <span class="notif-badge" id="requestsBadge" style="display:none">0</span></button>
</nav>

<div id="toast" class="toast"></div>
<div id="loadingOverlay" class="modal-overlay" style="display:none;align-items:center;justify-content:center"><div style="background:white;padding:24px;border-radius:12px;text-align:center"><div style="font-size:2rem;margin-bottom:8px">⏳</div><div id="loadingText">Loading...</div></div></div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModalOverlay" style="display:none">
  <div class="form-card" style="max-width:400px;width:100%">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Register</button>
    </div>
    <form class="auth-form active" id="loginForm" onsubmit="handleEmailAuth(event)"><div class="form-group"><label>Email</label><input type="email" id="loginEmail" required></div><div class="form-group"><label>Password</label><input type="password" id="loginPassword" required></div><div id="authError" style="color:red;font-size:0.85rem;margin-bottom:8px;display:none"></div><button type="submit" class="btn btn-primary btn-full">Sign In</button></form>
    <form class="auth-form" id="registerForm" onsubmit="handleEmailAuth(event)"><div class="form-group"><label>Email</label><input type="email" id="registerEmail" required></div><div class="form-group"><label>Password</label><input type="password" id="registerPassword" required minlength="6"></div><div id="authErrorReg" style="color:red;font-size:0.85rem;margin-bottom:8px;display:none"></div><div id="authSuccessReg" style="color:var(--green);font-size:0.85rem;margin-bottom:8px;display:none"></div><button type="submit" class="btn btn-primary btn-full">Register</button></form>
    <div class="divider">or</div>
    <button class="btn btn-google btn-full" onclick="handleGoogleAuth()">🔵 Continue with Google</button>
    <div style="text-align:center;margin-top:12px"><button style="background:none;border:none;color:var(--gray-400);font-size:0.8rem;cursor:pointer" onclick="closeModal('authModalOverlay')">Close</button></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModalOverlay" style="display:none">
  <div class="form-card" style="max-width:400px;width:100%">
    <h3 style="margin-bottom:16px">⚙️ Settings</h3>
    <div class="form-group"><label>Supabase URL</label><input type="text" id="settingsSbUrl" placeholder="https://your-project.supabase.co"></div>
    <div class="form-group"><label>Supabase Anon Key</label><input type="text" id="settingsSbKey" placeholder="your-anon-key"></div>
    <div id="settingsError" style="color:red;font-size:0.85rem;margin-bottom:8px;display:none"></div>
    <button class="btn btn-primary btn-full" onclick="saveSettings()">Save & Connect</button>
    <div style="text-align:center;margin-top:12px"><button style="background:none;border:none;color:var(--gray-400);font-size:0.8rem;cursor:pointer" onclick="closeModal('settingsModalOverlay')">Close</button></div>
  </div>
</div>

<!-- Item Detail Modal -->
<div class="modal-overlay" id="itemModalOverlay" style="display:none">
  <div id="itemModalContent" style="background:white;border-radius:var(--radius);max-width:500px;width:100%;max-height:90vh;overflow-y:auto"></div>
</div>

<script src="js/utils.js?v=1780569489"></script>

<script src="js/map.js?v=1780569489"></script>
<script src="js/auth.js?v=1780569489"></script>
<script src="js/items.js?v=1780569489"></script>
<script src="js/chats.js?v=1780569489"></script>
<script src="js/requests.js?v=1780569489"></script>
<script src="js/images.js?v=1780569489"></script>
<script src="js/ui.js?v=1780569489"></script>
<script src="js/profile.js?v=1780569489"></script>
<script src="js/notifications.js?v=1780569489"></script>

<script src="js/router.js?v=1780569489"></script>
<script src="js/app.js?v=1780569489"></script>
</body>
</html>
